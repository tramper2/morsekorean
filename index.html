<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 모르스 부호 변환기</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f4f4f9; }
        h2 { text-align: center; color: #333; }
        textarea { width: 100%; height: 120px; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; resize: none; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-play { background-color: #4CAF50; color: white; }
        .btn-play:hover { background-color: #45a049; }
        .hint { font-size: 0.9rem; color: #666; text-align: center; }
    </style>
</head>
<body>

    <h2>📟 한글 모르스 변환기</h2>
    
    <p>텍스트 (한글/영문/숫자):</p>
    <textarea id="textInput" placeholder="안녕? 혹은 Hello 입력..."></textarea>

    <div class="controls">
        <button class="btn-play" onclick="playMorse()">🔊 신호 듣기</button>
    </div>

    <p>모르스 부호:</p>
    <textarea id="morseOutput" placeholder=".-.-  ...-  ..-. (직접 입력 가능)"></textarea>

    <p class="hint">부호와 부호 사이는 1칸 띄우고, 글자 사이는 3칸(또는 /) 띄워주세요.</p>

    <!-- 한글 분리 라이브러리 (Hangul.js) -->
   <script src="https://unpkg.com/hangul-js"></script>
<script>
    // 쌍자음을 기본 자음으로 분해하는 매핑 테이블
    const DOUBLE_CONSONANTS = {
        'ㄲ': 'ㄱㄱ', 'ㄸ': 'ㄷㄷ', 'ㅃ': 'ㅂㅂ', 'ㅆ': 'ㅅㅅ', 'ㅉ': 'ㅈㅈ'
    };

    const MORSE_MAP = {
        'ㄱ': '.-..', 'ㄴ': '..-.', 'ㄷ': '-...', 'ㄹ': '...-', 'ㅁ': '--', 'ㅂ': '.--', 'ㅅ': '--.', 'ㅇ': '.-.-', 'ㅈ': '.--.', 'ㅊ': '-.-.', 'ㅋ': '-..-', 'ㅌ': '--..', 'ㅍ': '---.', 'ㅎ': '----',
        'ㅏ': '.', 'ㅑ': '..', 'ㅓ': '-', 'ㅕ': '...', 'ㅗ': '.-', 'ㅛ': '-.', 'ㅜ': '....', 'ㅠ': '.-.', 'ㅡ': '-..', 'ㅣ': '..-', 'ㅐ': '--.-', 'ㅔ': '-.--',
        '1': '.----', '2': '..---', '3': '...--', '4': '....-', '5': '.....', '6': '-....', '7': '--...', '8': '---..', '9': '----.', '0': '-----',
        '?': '..--..', '.': '.-.-.-', ',': '--..--', '/': '-..-.', ' ': '/'
    };

    const REVERSE_MAP = Object.fromEntries(Object.entries(MORSE_MAP).map(([k, v]) => [v, k]));

    const textInput = document.getElementById('textInput');
    const morseOutput = document.getElementById('morseOutput');

    // 모르스 -> 텍스트 변환 (개선된 로직)
morseOutput.addEventListener('input', () => {
    const inputVal = morseOutput.value.trim();
    
    // 1. 단어/글자 단위로 분리 ( / 또는 공백 3칸 기준 )
    const words = inputVal.split(/\s\/\s|\s{3,}/); 
    
    const decodedMessage = words.map(word => {
        // 2. 글자 내의 자모음 부호들 분리 (공백 1칸 기준)
        const codes = word.split(/\s+/);
        const chars = codes.map(code => REVERSE_MAP[code] || '').join('');
        
        // 3. 각 글자 단위로 조립하여 합침
        return Hangul.assemble(chars);
    }).join(' '); // 단어 사이 공백 추가

    textInput.value = decodedMessage;
});

// 텍스트 -> 모르스 변환 (글자 간 간격 추가)
textInput.addEventListener('input', () => {
    let val = textInput.value;
    let result = [];

    // 글자별로 루프를 돌며 글자 사이에 명확한 구분자(   )를 삽입
    for (const char of val) {
        if (char === ' ') {
            result.push('/');
            continue;
        }
        
        let disassembled = Hangul.disassemble(char);
        let fixedList = [];
        disassembled.forEach(c => {
            if (DOUBLE_CONSONANTS[c]) {
                fixedList.push(...DOUBLE_CONSONANTS[c].split(''));
            } else {
                fixedList.push(c);
            }
        });

        result.push(fixedList.map(c => MORSE_MAP[c] || c).join(' '));
    }
    
    // 글자와 글자 사이는 공백 3칸으로 구분
    morseOutput.value = result.join('   '); 
});

    // 오디오 재생 로직 (기존과 동일)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playMorse() {
        const morse = morseOutput.value;
        let time = audioCtx.currentTime;
        const dot = 0.1;

        morse.split('').forEach(symbol => {
            if (symbol === '.' || symbol === '-') {
                const duration = (symbol === '.') ? dot : dot * 3;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 700;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + duration);
                gain.gain.setValueAtTime(0.5, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                time += duration + dot;
            } else if (symbol === ' ') {
                time += dot * 2;
            }
        });
    }
</script>
</body>
</html>
